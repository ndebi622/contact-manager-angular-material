name: Docker image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

   runs-on: ubuntu-latest

   steps:
   - uses: actions/checkout@v3


   -
     name: set up Docker Buildx
     uses: docker/setup-buildx-action@v2


  -
     name: login to Dockerhub
     uses: docker/login-action@v2
     with:
       username: ${{ secrets.DOCKERHUB_USERNAME }}
       password: ${{ secrets.DOCKERHUB_TOKEN }}

  -
      name: Build and push
      uses: docker/build-push-actions@v3
      with:
        push: true
        tags: ndebi/contact-manager:v2

    -
      name: Install Trivy
      run:
        sudo apt-get update
        sudo apt-get install wget -y
        wget https://github.com/acquasecurity/trivy/releases/download/v0.44.0/trivy_0.44_linux-64bit.deb
        sudo dpkg -i trivy_0.44_0_linux-64bit.deb

    -
      name: scan Docker image with trivy
      run:
       trivy image ndebi/contact-manager:v2
